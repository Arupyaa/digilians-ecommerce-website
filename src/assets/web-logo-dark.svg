<svg width="540" height="200" viewBox="0 0 680 260" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>CoreByte dark mode logo</title>
  <desc>Dark navbar version of the CoreByte logo for a computer parts and accessories store</desc>

  <!-- Chip body -->
  <rect x="80" y="80" width="100" height="100" rx="6" fill="#60a5fa" />

  <!-- Inner chip die -->
  <rect x="100" y="100" width="60" height="60" rx="3" fill="#1e3a6e" />

  <!-- Circuit grid lines inside die -->
  <line x1="110" y1="100" x2="110" y2="160" stroke="#93c5fd" stroke-width="1" />
  <line x1="120" y1="100" x2="120" y2="160" stroke="#93c5fd" stroke-width="1" />
  <line x1="130" y1="100" x2="130" y2="160" stroke="#93c5fd" stroke-width="1" />
  <line x1="140" y1="100" x2="140" y2="160" stroke="#93c5fd" stroke-width="1" />
  <line x1="150" y1="100" x2="150" y2="160" stroke="#93c5fd" stroke-width="1" />
  <line x1="100" y1="110" x2="160" y2="110" stroke="#93c5fd" stroke-width="1" />
  <line x1="100" y1="120" x2="160" y2="120" stroke="#93c5fd" stroke-width="1" />
  <line x1="100" y1="130" x2="160" y2="130" stroke="#93c5fd" stroke-width="1" />
  <line x1="100" y1="140" x2="160" y2="140" stroke="#93c5fd" stroke-width="1" />
  <line x1="100" y1="150" x2="160" y2="150" stroke="#93c5fd" stroke-width="1" />

  <!-- Chip pins - top -->
  <rect x="96"  y="70" width="8" height="10" rx="2" fill="#60a5fa" />
  <rect x="114" y="70" width="8" height="10" rx="2" fill="#60a5fa" />
  <rect x="132" y="70" width="8" height="10" rx="2" fill="#60a5fa" />
  <rect x="150" y="70" width="8" height="10" rx="2" fill="#60a5fa" />

  <!-- Chip pins - bottom -->
  <rect x="96"  y="180" width="8" height="10" rx="2" fill="#60a5fa" />
  <rect x="114" y="180" width="8" height="10" rx="2" fill="#60a5fa" />
  <rect x="132" y="180" width="8" height="10" rx="2" fill="#60a5fa" />
  <rect x="150" y="180" width="8" height="10" rx="2" fill="#60a5fa" />

  <!-- Chip pins - left -->
  <rect x="70" y="96"  width="10" height="8" rx="2" fill="#60a5fa" />
  <rect x="70" y="114" width="10" height="8" rx="2" fill="#60a5fa" />
  <rect x="70" y="132" width="10" height="8" rx="2" fill="#60a5fa" />
  <rect x="70" y="150" width="10" height="8" rx="2" fill="#60a5fa" />

  <!-- Chip pins - right -->
  <rect x="180" y="96"  width="10" height="8" rx="2" fill="#60a5fa" />
  <rect x="180" y="114" width="10" height="8" rx="2" fill="#60a5fa" />
  <rect x="180" y="132" width="10" height="8" rx="2" fill="#60a5fa" />
  <rect x="180" y="150" width="10" height="8" rx="2" fill="#60a5fa" />

  <!-- Brand name -->
  <text x="210" y="148" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="58" fill="#f0f6ff">Core</text>
  <text x="378" y="148" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="58" fill="#60a5fa">Byte</text>

  <!-- Tagline -->
  <text x="211" y="178" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="15" fill="#93c5fd" letter-spacing="3">PARTS &amp; ACCESSORIES</text>

  <!-- Accent underline -->
  <rect x="211" y="188" width="330" height="3" rx="1.5" fill="#60a5fa" opacity="0.5" />
</svg>
